    <main>
        <section class="md:flex md:justify-center md:items-center md:flex-row-reverse">
            <section class="my-24 md:my-0 mt-6 mb-24 md:w-1/2">
                <h2 class="text-center text-2xl lg:text-xl font-bold text-blue rounded-xl mb-6 mx-auto md:hidden"
                    data-aos="fade-down" data-aos-duration="800">
                    Contact <span class=" text-white">Me</span>
                </h2>
                <form class="mx-auto" name="submit-to-google-sheet" method="post">
                    <div class="flex gap-3 w-11/12 mx-auto">
                        <div class="firstname flex flex-col w-1/2" data-aos="fade-up" data-aos-duration="800"
                            data-aos-once="true">
                            <label for="name" class="text-sm mb-2">Firstname:</label>
                            <input type="text"
                                class="border w-full text-sm pl-3 rounded-md focus:outline-none py-3 placeholder:text-white placeholder:text-opacity-40 bg-grey focus:border focus:border-blue"
                                id="name" placeholder="Firstname" name="namadepan" autofocus />
                        </div>
                        <div class="firstname flex flex-col w-1/2" data-aos="fade-up" data-aos-duration="800"
                            data-aos-once="true" data-aos-delay="100">
                            <label for="name" class="text-sm mb-2">Lastname:</label>
                            <input type="text"
                                class="border w-full text-sm pl-3 rounded-md focus:outline-none py-3 placeholder:text-white placeholder:text-opacity-40 bg-grey focus:border focus:border-blue"
                                name="namabelakang" id="lastname" placeholder="Lastname" />
                        </div>
                    </div>
                    <div class="flex flex-col w-11/12 mx-auto my-5" data-aos="fade-up" data-aos-duration="800"
                        data-aos-once="true" data-aos-delay="150>
                        <label class=" text-sm mb-2" for="email">Email:</label>
                        <input type="email" id="email" placeholder="Johndoe@gmail.com"
                            class="border w-full text-sm pl-3 rounded-md focus:outline-none py-3 placeholder:text-white placeholder:text-opacity-40 bg-grey focus:border focus:border-blue"
                            name="email" />
                    </div>

                    <div class="telepon flex flex-col w-11/12 mx-auto my-5" data-aos="fade-up" data-aos-duration="800"
                        data-aos-once="true" data-aos-delay="200">
                        <label class=" text-sm mb-2" for="phone">Phone Number:</label>
                        <input type="tel" id="phone" placeholder="08XX-XXXX-XXXX" pattern="(\+62|62|0)8[1-9][0-9]{6,9}$"
                            maxlength="13" name="telepon"
                            class="border w-full text-sm pl-3 rounded-md focus:outline-none py-3 placeholder:text-white placeholder:text-opacity-40 bg-grey focus:border focus:border-blue " />
                    </div>

                    <div class="message flex flex-col w-11/12 mx-auto my-5" data-aos="fade-up" data-aos-duration="800"
                        data-aos-once="true" data-aos-delay="250">
                        <label class=" text-sm mb-2" for="lastname">Message:</label>
                        <textarea rows="4" maxlength="500" name="pesan"
                            class="border w-full text-sm pl-3 rounded-md focus:outline-none py-3 placeholder:text-white placeholder:text-opacity-40 bg-grey focus:border focus:border-blue "
                            placeholder="Send me a message" id="message"></textarea>

                        <button type="submit" data-aos-delay="30"
                            class="flex justify-center my-5 w-full rounded-md mx-auto bg-greylight py-3 text-sm hover:bg-greylighten duration-300"
                            id="buttonSend">
                            send message
                        </button>
                    </div>
                </form>
            </section>
            <section class="my-24 md:w-1/2">
                <div>
                    <div data-aos="fade-up" data-aos-duration="800" data-aos-once="true">
                        <img src="public/illustration/mail.png" alt="img-mail" class="w-8/12 lg:w-6/12 mx-auto" />
                    </div>

                    <div class="rounded-md p-3 bg-grey w-11/12 mx-auto" data-aos="fade-up" data-aos-duration="800"
                        data-aos-once="true" data-aos-delay="300">
                        <h3 class="text-md font-semibold mb-4"><span class="text-blue font-bold">Connect</span> With Me
                        </h3>
                        <div class="social-items flex gap-1 md:justify-between justify-evenly flex-wrap">
                            <a data-aos="fade-up" data-aos-duration="800" data-aos-once="true" data-aos-delay="200"

                                class="bg-greylight hover:bg-greylighten py-2 px-3 rounded-md w-10 h-10 flex justify-center align-middle items-center"><i
                                    class="fa-brands fa-instagram fa-xl"></i> </a>
                            <a data-aos="fade-up" data-aos-duration="800" data-aos-once="true" data-aos-delay="250"
                                href="mailto:sanjayaraka722@gmail.com" target="_blank"
                                class="bg-greylight hover:bg-greylighten py-2 px-3 rounded-md w-10 h-10 flex justify-center align-middle items-center"><i
                                    class="fa-solid fa-envelope fa-xl"></i></a>
                            <a data-aos="fade-up" data-aos-duration="800" data-aos-once="true" data-aos-delay="300"
                                href="https://www.youtube.com/@RakaOdicah" target="_blank"
                                class="bg-greylight hover:bg-greylighten py-2 px-3 rounded-md w-10 h-10 flex justify-center align-middle items-center"><i
                                    class="fa-brands fa-youtube fa-xl"></i></a>

                            <a data-aos="fade-up" data-aos-duration="800" data-aos-once="true" data-aos-delay="400"
                                href="https://www.linkedin.com/in/raka-sanjaya/" target="_blank"
                                class="bg-greylight hover:bg-greylighten py-2 px-3 rounded-md w-10 h-10 flex justify-center align-middle items-center"><i
                                    class="fa-brands fa-linkedin fa-xl"></i></a>
                            <a data-aos="fade-up" data-aos-duration="800" data-aos-once="true" data-aos-delay="450"
                                href="https://github.com/RakaSanjaya" target="_blank"
                                class="bg-greylight hover:bg-greylighten py-2 px-3 rounded-md w-10 h-10 flex justify-center align-middle items-center"><i
